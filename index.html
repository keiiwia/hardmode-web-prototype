<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curiosity Engine</title>
  <style>
    @font-face {
      font-family: 'Geist';
      font-style: normal;
      font-display: swap;
      font-weight: 100 900;
      src: url(https://cdn.jsdelivr.net/fontsource/fonts/geist:vf@latest/latin-wght-normal.woff2) format('woff2-variations');
      unicode-range: U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;
    }
    @font-face {
      font-family: 'Geist Mono';
      font-style: normal;
      font-display: swap;
      font-weight: 100 900;
      src: url(https://cdn.jsdelivr.net/fontsource/fonts/geist-mono:vf@latest/latin-wght-normal.woff2) format('woff2-variations');
      unicode-range: U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;
    }

    :root {
      --border: #e5e5e7;
      --text: #171717;
      --muted: #737373;
      --accent: #0a0a0a;
      --accent-hover: #262626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Geist', system-ui, sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .top-bar {
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .top-bar input[type="password"] {
      flex: 1;
      max-width: 320px;
      padding: 0.4rem 0.6rem;
      font-family: 'Geist Mono', monospace;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      background: transparent;
    }

    .top-bar input::placeholder {
      color: var(--muted);
    }

    .top-bar input:focus {
      outline: none;
      border-color: var(--text);
    }

    .top-bar .hint {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .main-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      min-width: 0;
    }

    .main-right {
      width: 400px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-right .section-title {
      font-size: 0.8rem;
      margin-bottom: 0.6rem;
    }

    .section {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child {
      border-bottom: none;
    }

    .section-title {
      font-family: 'Geist Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    /* Webcam — focal point */
    .webcam-section {
      padding: 0 1.5rem 1.5rem;
    }

    .webcam-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      max-height: min(56vh, 520px);
      background: #000;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #canvas {
      display: none;
    }

    .webcam-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.9rem;
      font-family: 'Geist', system-ui, sans-serif;
    }

    .webcam-wrap.active .webcam-placeholder {
      display: none;
    }

    .question-section {
      padding: 1rem 1.5rem 0;
    }

    .question-box {
      min-height: 80px;
      padding: 0.75rem 0;
      font-family: 'Geist Mono', monospace;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .question-box.empty {
      color: var(--muted);
      font-style: italic;
    }

    .question-box.loading {
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      padding: 1rem 1.5rem 0;
    }

    button {
      font-family: 'Geist', system-ui, sans-serif;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-secondary:hover:not(:disabled) {
      background: #f5f5f5;
      border-color: var(--muted);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .interval-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Geist Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .interval-wrap input {
      width: 3.5rem;
      padding: 0.35rem 0.4rem;
      font-family: 'Geist Mono', monospace;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      background: transparent;
    }

    /* Right column — archives */
    .archive-list,
    .archive-text-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-height: 300px;
      overflow-y: auto;
    }

    .archive-text-list {
      max-height: 280px;
    }

    .archive-item {
      display: flex;
      gap: 0.75rem;
      padding: 0.65rem 0;
      font-family: 'Geist Mono', monospace;
      font-size: 0.95rem;
      line-height: 1.45;
      color: var(--muted);
      align-items: flex-start;
      border-bottom: 1px solid var(--border);
    }

    .archive-item:last-child {
      border-bottom: none;
    }

    .archive-item-thumb {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: var(--border);
    }

    .archive-item-text {
      flex: 1;
      min-width: 0;
    }

    .archive-item:first-child .archive-item-text {
      color: var(--text);
    }

    .archive-empty,
    .archive-text-empty {
      color: var(--muted);
      font-size: 0.95rem;
      font-style: italic;
      font-family: 'Geist', system-ui, sans-serif;
    }

    .archive-text-item {
      padding: 0.55rem 0;
      font-family: 'Geist Mono', monospace;
      font-size: 0.95rem;
      line-height: 1.45;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .archive-text-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <input
      type="password"
      id="apiKey"
      placeholder="API key (sk-ant-...)"
      autocomplete="off"
    />
    <span class="hint">Only in this browser; only sent to Anthropic.</span>
  </header>

  <div class="main">
    <div class="main-left">
      <section class="webcam-section">
        <div class="webcam-wrap" id="webcamWrap">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="canvas"></canvas>
          <div class="webcam-placeholder" id="placeholder">Click Start to allow camera (use http://localhost:3000 if the camera is blocked)</div>
        </div>
      </section>
      <section class="question-section">
        <div class="section-title">Question</div>
        <div class="question-box empty" id="questionBox">Questions from the curiosity engine will appear here.</div>
      </section>
      <div class="controls">
        <button type="button" class="btn-primary" id="btnStart" disabled>Start</button>
        <button type="button" class="btn-secondary" id="btnStop" disabled>Stop</button>
        <div class="interval-wrap">
          <label for="interval">Every</label>
          <input type="number" id="interval" value="5" min="3" max="60" />
          <span>sec</span>
        </div>
      </div>
    </div>

    <aside class="main-right">
      <section class="section">
        <div class="section-title">Archive</div>
        <ul class="archive-list" id="archiveList"></ul>
        <p class="archive-empty" id="archiveEmpty">No previous questions yet.</p>
      </section>
      <section class="section">
        <div class="section-title">Archive (text only)</div>
        <ul class="archive-text-list" id="archiveTextList"></ul>
        <p class="archive-text-empty" id="archiveTextEmpty">No previous questions yet.</p>
      </section>
    </aside>
  </div>

  <script>
    // Elements
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const webcamWrap = document.getElementById('webcamWrap');
    const placeholder = document.getElementById('placeholder');
    const questionBox = document.getElementById('questionBox');
    const apiKeyInput = document.getElementById('apiKey');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const intervalInput = document.getElementById('interval');
    const archiveList = document.getElementById('archiveList');
    const archiveEmpty = document.getElementById('archiveEmpty');
    const archiveTextList = document.getElementById('archiveTextList');
    const archiveTextEmpty = document.getElementById('archiveTextEmpty');

    let stream = null;
    let captureTimer = null;
    let questionArchive = [];
    let currentQuestionImageDataUrl = null;

    function setQuestion(text, isLoading = false, imageBase64 = null) {
      const previous = questionBox.textContent?.trim() || '';
      const placeholderText = 'Questions from the curiosity engine will appear here.';
      const isRealQuestion = previous && !previous.startsWith('Error:') && previous !== 'Thinking…' && previous !== placeholderText;

      // Archive the current question (with its image) when we're about to replace it
      if (isRealQuestion && (isLoading || (text && !text.startsWith('Error:')))) {
        questionArchive.unshift({
          text: previous,
          imageDataUrl: currentQuestionImageDataUrl ? currentQuestionImageDataUrl : null,
        });
        renderArchive();
      }
      if (imageBase64) {
        currentQuestionImageDataUrl = 'data:image/jpeg;base64,' + imageBase64;
      }
      questionBox.textContent = text || '';
      questionBox.classList.toggle('empty', !text && !isLoading);
      questionBox.classList.toggle('loading', isLoading);
    }

    function renderArchive() {
      archiveList.innerHTML = '';
      questionArchive.forEach((item) => {
        const li = document.createElement('li');
        li.className = 'archive-item';
        if (item.imageDataUrl) {
          const img = document.createElement('img');
          img.className = 'archive-item-thumb';
          img.src = item.imageDataUrl;
          img.alt = '';
          li.appendChild(img);
        }
        const span = document.createElement('span');
        span.className = 'archive-item-text';
        span.textContent = item.text;
        li.appendChild(span);
        archiveList.appendChild(li);
      });
      archiveEmpty.hidden = questionArchive.length > 0;

      archiveTextList.innerHTML = '';
      questionArchive.forEach((item) => {
        const li = document.createElement('li');
        li.className = 'archive-text-item';
        li.textContent = item.text;
        archiveTextList.appendChild(li);
      });
      archiveTextEmpty.hidden = questionArchive.length > 0;
    }

    function enableStart() {
      btnStart.disabled = !apiKeyInput.value.trim();
    }

    apiKeyInput.addEventListener('input', enableStart);

    function isSecureContext() {
      return (typeof window !== 'undefined' && window.isSecureContext) ||
        (typeof location !== 'undefined' && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1'));
    }

    async function startWebcam() {
      if (!isSecureContext()) {
        placeholder.textContent = 'Camera requires a secure page. Open this app via http://localhost:3000 (run: node server.js) or use HTTPS.';
        return false;
      }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        placeholder.textContent = 'Camera not supported in this browser. Try Chrome, Firefox, or Safari.';
        return false;
      }
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video.srcObject = stream;
        webcamWrap.classList.add('active');
        placeholder.textContent = '';
        btnStart.disabled = true;
        btnStop.disabled = false;
        return true;
      } catch (e) {
        const name = e.name || '';
        let msg = e.message || 'Permission denied';
        if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
          msg = 'Camera blocked. Allow camera for this site in the address bar or in browser settings, then reload.';
        } else if (name === 'NotFoundError') {
          msg = 'No camera found. Connect a camera and try again.';
        } else if (name === 'NotReadableError' || name === 'TrackStartError') {
          msg = 'Camera in use by another app. Close it and try again.';
        } else if (name === 'SecurityError') {
          msg = 'Camera not allowed on this page. Use http://localhost:3000 or HTTPS.';
        }
        placeholder.textContent = 'Camera error: ' + msg;
        return false;
      }
    }

    function stopWebcam() {
      if (captureTimer) {
        clearInterval(captureTimer);
        captureTimer = null;
      }
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video.srcObject = null;
      webcamWrap.classList.remove('active');
      placeholder.textContent = 'Allow camera access to start';
      btnStart.disabled = !apiKeyInput.value.trim();
      btnStop.disabled = true;
    }

    function captureFrameAsBase64() {
      if (!stream || !video.videoWidth) return null;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
    }

    async function askCuriosity(frameBase64) {
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey || !frameBase64) return;

      setQuestion('Thinking…', true);

      try {
        const response = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey, imageBase64: frameBase64 }),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || response.statusText || 'Request failed');
        const newText = data.text || 'No question generated.';
        setQuestion(newText, false, frameBase64);
      } catch (e) {
        setQuestion('Error: ' + (e.message || 'Request failed'));
      }
    }

    function startCaptureLoop() {
      const sec = Math.max(3, Math.min(60, Number(intervalInput.value) || 5));
      askCuriosity(captureFrameAsBase64());
      captureTimer = setInterval(() => askCuriosity(captureFrameAsBase64()), sec * 1000);
    }

    btnStart.addEventListener('click', async () => {
      if (await startWebcam()) startCaptureLoop();
    });

    btnStop.addEventListener('click', stopWebcam);

    enableStart();
  </script>
</body>
</html>
